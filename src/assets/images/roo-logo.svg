<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="currentColor">
	<title>Elephant Code</title>
	<!--
		Simple elephant silhouette for the VS Code activity bar.
		Uses `currentColor` so VS Code auto-tints with the theme.
	-->
	<g>
		<!-- Body -->
		<path d="M 80 200
		         Q 80 140 150 130
		         L 270 130
		         Q 320 130 320 180
		         L 320 250
		         Q 320 280 290 280
		         L 110 280
		         Q 80 280 80 250
		         Z" />

		<!-- Head -->
		<circle cx="130" cy="180" r="60" />

		<!-- Ear -->
		<path d="M 120 130
		         Q 70 130 65 180
		         Q 65 220 105 230
		         Q 115 200 120 165
		         Z" />

		<!-- Trunk (curved tube) -->
		<path d="M 90 195
		         Q 30 200 30 270
		         Q 30 320 80 320
		         Q 110 320 110 290
		         Q 110 270 90 268
		         Q 70 266 70 280
		         Q 70 295 85 295
		         Q 95 295 95 285"
		      fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />

		<!-- Eye -->
		<circle cx="145" cy="170" r="8" fill="#ffffff" />
		<circle cx="146" cy="170" r="4" />

		<!-- Tail -->
		<path d="M 318 220
		         Q 350 220 355 250
		         Q 358 270 348 280"
		      fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" />

		<!-- Legs -->
		<rect x="140" y="270" width="40" height="80" rx="14" />
		<rect x="200" y="270" width="40" height="80" rx="14" />
		<rect x="250" y="270" width="40" height="80" rx="14" />
		<rect x="295" y="270" width="38" height="80" rx="14" />
	</g>
</svg>
